# template-info.yaml — PostgreSQL Demo UIS stack template

id: postgresql-demo
version: "1.0.0"
name: PostgreSQL Demo
description: Deploys PostgreSQL and creates a sample database with seed data
category: DEMO
install_type: stack
abstract: >
  A minimal UIS template that deploys PostgreSQL and creates a sample
  tasks table with seed data. Shows the full uis template flow from
  registry to deployed, configured service. Use this to verify your
  UIS setup or as a starting point for your own stack templates.
tools: ""
readme: README-postgresql-demo.md
tags:
  - postgresql
  - database
  - demo
  - getting-started
logo: postgresql-demo-logo.svg
maintainers:
  - terchris
links:
  - url: https://github.com/helpers-no/dev-templates/tree/main/uis-stack-templates/postgresql-demo
    title: Source code
    icon: github
related:
  - python-basic-webserver-database

quickstart:
  title: "Verify the database"
  setup: []
  run: "uis connect postgresql demo_db"
  note: |
    Inside psql, run: SELECT * FROM tasks;
    You should see 3 seeded rows. Type \q to exit.

# Command a developer runs to install this stack into UIS.
# Stack templates use `uis template install <id>`; app templates use
# `dev-template configure`; templates with no configure step omit this.
configure_command: "uis template install postgresql-demo"

params:
  app_name: "demo-app"
  database_name: "demo_db"

prerequisites:
  - text: "DCT devcontainer running"
    url: "https://dct.sovereignsky.no"
  - text: "UIS provision-host container running"
    url: "https://uis.sovereignsky.no"
  - text: "Local Kubernetes cluster running (Rancher Desktop)"
    url: "https://www.rancher.com/products/rancher-desktop"

provides:
  services:
    - service: postgresql
      config:
        database: "{{ params.database_name }}"
        init: "config/init-database.sql"
