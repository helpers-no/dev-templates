name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'templates/**/template-info.yaml'
      - 'templates/template-categories.yaml'
      - 'ai-templates/**/template-info.yaml'
      - 'ai-templates/template-categories.yaml'
      - 'scripts/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Validate template metadata
        run: bash scripts/validate-metadata.sh

      - name: Generate template-registry.json
        run: npx tsx scripts/generate-registry.ts

      - name: Generate template documentation pages
        run: bash scripts/generate-docs-markdown.sh --force

      - name: Generate plan indexes
        run: bash scripts/generate-plan-indexes.sh

      - name: Validate documentation
        run: bash scripts/validate-docs.sh

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
