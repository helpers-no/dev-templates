id: typescript-basic-webserver
version: "1.0.0"
name: TypeScript Basic Webserver
description: Express.js server with TypeScript, health endpoint, and Docker support
category: BASIC_WEB_SERVER
install_type: app
abstract: >
  A minimal Express.js web server written in TypeScript with hot reload
  via nodemon. Includes Docker containerization, Kubernetes deployment
  manifests, and GitHub Actions CI/CD workflow.
tools: dev-typescript
readme: README-typescript-basic-webserver.md
tags:
  - typescript
  - express
  - webserver
  - api
  - rest
logo: typescript-basic-webserver-logo.svg
maintainers:
  - terchris
links:
  - url: https://github.com/helpers-no/dev-templates/tree/main/templates/typescript-basic-webserver
    title: Source code
    icon: github
related:
  - designsystemet-basic-react-app
  - python-basic-webserver

quickstart:
  title: "Run the Express server"
  setup:
    - npm install
  run: "npm run dev"
  note: |
    Server runs on port 3000 with hot reload via nodemon. VS Code auto-forwards the port.

params:
  app_name: "my-app"

prerequisites:
  - text: "DCT devcontainer running"
    url: "https://dct.sovereignsky.no"
