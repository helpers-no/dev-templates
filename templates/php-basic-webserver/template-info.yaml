id: php-basic-webserver
version: "1.0.0"
name: PHP Basic Webserver
description: PHP web server using built-in server with health endpoint and Docker support
category: BASIC_WEB_SERVER
install_type: app
abstract: >
  A minimal PHP web server using PHP's built-in server with a health
  check endpoint. Includes Docker containerization, Kubernetes deployment
  manifests, and GitHub Actions CI/CD workflow.
