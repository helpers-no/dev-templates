id: python-basic-webserver
version: "1.0.0"
name: Python Basic Webserver
description: Minimal Flask server with health endpoint and Docker support
category: BASIC_WEB_SERVER
install_type: app
abstract: >
  A minimal Python web server using Flask with a health check endpoint.
  Includes Docker containerization, Kubernetes deployment manifests,
  and GitHub Actions CI/CD workflow. Ideal for microservices and API
  backends.
tools: dev-python
readme: README-python-basic-webserver.md
tags:
  - python
  - flask
  - webserver
  - api
  - rest
logo: python-basic-webserver-logo.svg
maintainers:
  - terchris
links:
  - url: https://github.com/helpers-no/dev-templates/tree/main/templates/python-basic-webserver
    title: Source code
    icon: github
related:
  - php-basic-webserver
  - typescript-basic-webserver

quickstart:
  title: "Run the Flask app"
  setup:
    - uv venv
    - uv pip install -r requirements.txt
  run: "uv run python app/app.py"
  note: |
    Flask runs on port 3000. VS Code auto-forwards the port — click the globe icon in the Ports tab.

params:
  app_name: "my-app"

prerequisites:
  - text: "DCT devcontainer running"
    url: "https://dct.sovereignsky.no"
