# validate-rules.conf — Documentation validation rules
#
# Format: FILE_PATTERN|RULE_TYPE|VALUE|SEVERITY
#
# FILE_PATTERN:  Glob pattern matched against filename (not path)
# RULE_TYPE:     required_heading, forbidden_pattern
# VALUE:         Heading text (case-insensitive) or regex pattern
# SEVERITY:      error (blocks build), warn (prints warning)
#
# Lines starting with # are comments. Empty lines are ignored.
#
# To add a new check, just add a line. No code changes needed.

# ============================================================
# Template READMEs — optional sections
# ============================================================
# Quick Start, Prerequisites, and Project Structure were removed
# from READMEs after their content moved to auto-generated cards
# (Getting Started card, Environment card, Files dropdown).
# READMEs now contain only supplementary prose that the cards
# cannot generate. These headings are no longer required.
README-*.md|required_heading|Development|warn
README-*.md|required_heading|CI/CD|warn

# "Docker Build" and "Kubernetes Deployment" sections were dropped in
# Phase 4 of PLAN-p1-tmp-template-docs-fixes.md — they describe a manual
# flow that bypasses GitHub Actions + ArgoCD. New templates should use a
# single "Deploy" section that references the GitOps workflow instead.

# ============================================================
# Template READMEs — MDX compatibility
# ============================================================
# Bare angle brackets in README-*.md files break the MDX parser
# when the README is embedded into a generated .mdx page. Other
# markdown files (guide pages, plans) are either standalone or
# use legitimate HTML elements like <video>, <details>, <pre>.
README-*.md|forbidden_pattern|^<[a-zA-Z]|error
